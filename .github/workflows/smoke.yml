name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'  # nightly 3am UTC
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: catering
          POSTGRES_PASSWORD: catering
          POSTGRES_DB: catering_dev
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U catering"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://catering:catering@localhost:5432/catering_dev
      REDIS_URL: redis://localhost:6379
      REDIS_HOST: localhost
      DB_HOST: localhost
      DB_USER: catering
      DB_PASSWORD: catering
      DB_NAME: catering_dev
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-smoke-jwt-secret-please-change-32-chars-long-string' }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-smoke-refresh-secret-please-change-32-chars-string' }}
      CARDCOM_TERMINAL: ${{ secrets.CARDCOM_TERMINAL_SANDBOX || '1000' }}
      CARDCOM_USERNAME: ${{ secrets.CARDCOM_USERNAME_SANDBOX || 'sandbox' }}
      ICOUNT_API_TOKEN: ${{ secrets.ICOUNT_API_TOKEN_SANDBOX || 'sandbox' }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY || 'SG.sandbox' }}
      CARDCOM_MOCK: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm prisma migrate deploy
        continue-on-error: true

      - name: Run seed
        run: pnpm db:seed
        continue-on-error: true

      - name: Install gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Wait for services
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -U catering && redis-cli -h localhost ping && break
            sleep 2
          done

      - name: Run smoke tests
        id: smoke
        run: |
          chmod +x smoke-tests/scripts/run-smoke.sh
          bash smoke-tests/scripts/run-smoke.sh quick

      - name: Run integration tests
        run: pnpm vitest run smoke-tests/tests/integration --reporter=verbose
        continue-on-error: false

      - name: Run security tests
        run: pnpm vitest run smoke-tests/tests/security --reporter=verbose

      - name: Run health endpoint tests
        run: pnpm vitest run smoke-tests/tests/health --reporter=verbose
        continue-on-error: true

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            smoke-results.json
            smoke-tests/dashboards/smoke-results.html
            smoke-tests/dashboards/playwright-report/

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = 'Smoke tests results unavailable.';
            try {
              const results = JSON.parse(fs.readFileSync('smoke-results.json', 'utf8'));
              const pass = results.filter(r => r.status === 'pass').length;
              const fail = results.filter(r => r.status === 'fail').length;
              const skip = results.filter(r => r.status === 'skip').length;
              const status = fail === 0 ? 'PASSED' : 'FAILED';
              summary = `### Smoke Tests: ${status}\n\nPass: ${pass} | Fail: ${fail} | Skip: ${skip}`;
              if (fail > 0) {
                const failed = results.filter(r => r.status === 'fail');
                summary += '\n\n**Failures:**\n' + failed.map(f => `- ${f.name}: ${f.error}`).join('\n');
              }
            } catch (e) {}
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary,
            });

  notify-on-failure:
    needs: smoke
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Notify failure
        run: echo "Nightly smoke failed - send Slack/email alert here"
