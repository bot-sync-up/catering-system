name: Android CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile-android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'apps/mobile-android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: apps/mobile-android

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Run lint
        run: ./gradlew lintDebug --no-daemon
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/mobile-android/app/build/reports/tests/

  build-debug:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v3
      - run: chmod +x gradlew
      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: apps/mobile-android/app/build/outputs/apk/debug/*.apk

  build-release:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    env:
      KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v3
      - run: chmod +x gradlew

      - name: Decode keystore
        if: env.KEYSTORE_PASSWORD != ''
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > $KEYSTORE_PATH
          fi

      - name: Assemble release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Bundle release AAB
        run: ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: apps/mobile-android/app/build/outputs/apk/release/*.apk
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: apps/mobile-android/app/build/outputs/bundle/release/*.aab
