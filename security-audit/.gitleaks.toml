# gitleaks config — Israeli + general API key patterns
title = "Israeli SaaS gitleaks config"

[extend]
useDefault = true

# === Israeli payment + SMS providers ===

[[rules]]
id = "icount-api-key"
description = "iCount accounting API key"
regex = '''(?i)(icount[_-]?(api[_-]?)?key|cid)["'\s:=]+([A-Za-z0-9_\-]{20,})'''
tags = ["israeli", "billing", "icount"]
secretGroup = 3

[[rules]]
id = "cardcom-terminal"
description = "Cardcom terminal number + API name"
regex = '''(?i)(cardcom[_-]?(terminal|api[_-]?name|password)|TerminalNumber)["'\s:=]+([A-Za-z0-9_\-]{4,})'''
tags = ["israeli", "payment", "cardcom"]
secretGroup = 3

[[rules]]
id = "tranzila-supplier"
description = "Tranzila supplier credentials"
regex = '''(?i)(tranzila[_-]?(supplier|terminal|password))["'\s:=]+([A-Za-z0-9_\-]{4,})'''
tags = ["israeli", "payment"]
secretGroup = 3

[[rules]]
id = "pelecard-credentials"
description = "PeleCard user + password"
regex = '''(?i)(pelecard[_-]?(user|password|terminal))["'\s:=]+([A-Za-z0-9_\-]{4,})'''
tags = ["israeli", "payment"]
secretGroup = 3

[[rules]]
id = "019sms-token"
description = "019 SMS Israeli gateway token"
regex = '''(?i)(019[_-]?(sms|token|user))["'\s:=]+([A-Za-z0-9_\-]{10,})'''
tags = ["israeli", "sms"]
secretGroup = 3

[[rules]]
id = "inforu-token"
description = "InforU SMS gateway"
regex = '''(?i)(inforu[_-]?(token|user|password))["'\s:=]+([A-Za-z0-9_\-]{10,})'''
tags = ["israeli", "sms"]
secretGroup = 3

# === AI/cloud providers ===

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-(api|admin)\d{2}-[A-Za-z0-9_\-]{80,}'''
tags = ["anthropic", "ai"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-(proj-)?[A-Za-z0-9_\-]{40,}'''
tags = ["openai", "ai"]

[[rules]]
id = "sendgrid-key"
description = "SendGrid API key"
regex = '''SG\.[A-Za-z0-9_\-]{22}\.[A-Za-z0-9_\-]{43}'''
tags = ["sendgrid", "email"]

[[rules]]
id = "twilio-account-sid"
description = "Twilio Account SID"
regex = '''AC[a-f0-9]{32}'''
tags = ["twilio", "sms"]

[[rules]]
id = "twilio-auth-token"
description = "Twilio Auth Token"
regex = '''(?i)twilio[_-]?(auth[_-]?)?token["'\s:=]+([a-f0-9]{32})'''
secretGroup = 2
tags = ["twilio"]

# === Israeli PII ===

[[rules]]
id = "israeli-teudat-zehut"
description = "Israeli national ID (ת״ז) — 9 digits in code"
regex = '''(?i)(teudat[_-]?zehut|tz|israeliId|personalId)["'\s:=]+(\d{9})\b'''
secretGroup = 2
tags = ["pii", "israeli", "tz"]

[[rules]]
id = "credit-card-number"
description = "Credit card number (Luhn-likely)"
regex = '''\b(?:4\d{15}|5[1-5]\d{14}|3[47]\d{13}|6011\d{12})\b'''
tags = ["pci", "pii"]

[[rules]]
id = "iban-il"
description = "Israeli IBAN"
regex = '''\bIL\d{2}\s?\d{4}\s?\d{4}\s?\d{4}\s?\d{4}\s?\d{3}\b'''
tags = ["banking", "israeli"]

# === Allowlist (false positives) ===

[allowlist]
description = "Global allowlist"
paths = [
  '''\.test\.(js|ts|py)$''',
  '''\.spec\.(js|ts|py)$''',
  '''__tests__/''',
  '''__mocks__/''',
  '''fixtures/''',
  '''snapshots/''',
  '''node_modules/''',
  '''vendor/''',
  '''package-lock\.json$''',
  '''yarn\.lock$''',
  '''pnpm-lock\.yaml$''',
]
regexes = [
  '''EXAMPLE[_-]?KEY''',
  '''YOUR[_-]?API[_-]?KEY[_-]?HERE''',
  '''xxx+''',
  '''000000000''',  # placeholder ת"ז
  '''123456789''',
]
