name: "CodeQL config"

disable-default-queries: false

queries:
  - uses: security-extended
  - uses: security-and-quality

paths:
  - src
  - app
  - api
  - server
  - lib
  - packages

paths-ignore:
  - node_modules
  - dist
  - build
  - coverage
  - "**/*.test.js"
  - "**/*.test.ts"
  - "**/*.spec.js"
  - "**/*.spec.ts"
  - "**/__tests__/**"
  - "**/__mocks__/**"
  - "**/vendor/**"
  - "**/generated/**"

query-filters:
  - exclude:
      id: js/unused-local-variable
  - exclude:
      id: js/useless-assignment-to-local
