name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git SHA / tag לפריסה (ברירת מחדל: HEAD)"
        required: false
        default: ""
      skip_tests:
        description: "דלג על smoke tests"
        type: boolean
        default: false

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/catering

jobs:
  build:
    name: Build & Push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.compute-tag.outputs.tag }}
    strategy:
      fail-fast: true
      matrix:
        service: [api, portal, admin, worker]
    steps:
      - uses: actions/checkout@v4

      - id: compute-tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            GIT_SHA=${{ steps.compute-tag.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.compute-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:staging

  deploy:
    name: Deploy to staging VPS
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://staging.catering.co.il
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Render .env.staging
        run: |
          cp staging-deployment/.env.staging.example staging-deployment/.env.staging
          sed -i "s|SECRETS_PLACEHOLDER_DB_URL|${{ secrets.STAGING_DB_URL }}|g" staging-deployment/.env.staging
          sed -i "s|SECRETS_PLACEHOLDER_REDIS_URL|${{ secrets.STAGING_REDIS_URL }}|g" staging-deployment/.env.staging
          sed -i "s|SECRETS_PLACEHOLDER_JWT_SECRET|${{ secrets.STAGING_JWT_SECRET }}|g" staging-deployment/.env.staging
          sed -i "s|SECRETS_PLACEHOLDER_STRIPE_KEY|${{ secrets.STAGING_STRIPE_KEY }}|g" staging-deployment/.env.staging
          sed -i "s|SECRETS_PLACEHOLDER_R2_ACCESS_KEY|${{ secrets.STAGING_R2_ACCESS_KEY }}|g" staging-deployment/.env.staging
          sed -i "s|SECRETS_PLACEHOLDER_R2_SECRET_KEY|${{ secrets.STAGING_R2_SECRET_KEY }}|g" staging-deployment/.env.staging
          sed -i "s|TAG_PLACEHOLDER|${{ needs.build.outputs.tag }}|g" staging-deployment/.env.staging

      - name: Run deploy
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER || 'deploy' }}
          STAGING_SSH_KEY: ~/.ssh/id_rsa
          REGISTRY: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          chmod +x staging-deployment/scripts/*.sh
          ./staging-deployment/scripts/deploy-staging.sh \
            --tag "${{ needs.build.outputs.tag }}" \
            --skip-build \
            $([[ "${{ inputs.skip_tests }}" == "true" ]] && echo "--skip-tests")

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\":x: Staging deploy ${{ needs.build.outputs.tag }} FAILED\\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK_URL"
