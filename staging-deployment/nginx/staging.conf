###############################################################################
# nginx/staging.conf
# גרסה standalone (לא דרך Ansible) - שימושית להעלאה ידנית או ב-docker.
###############################################################################

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;
    client_max_body_size 50M;

    # gzip
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # rate limit zones
    limit_req_zone $binary_remote_addr zone=staging_api:10m   rate=20r/s;
    limit_req_zone $binary_remote_addr zone=staging_login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=staging_conn:10m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # security headers (shared)
    map $sent_http_content_type $hsts_header {
        default "max-age=31536000; includeSubDomains; preload";
    }

    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"host":"$host",'
        '"request":"$request",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"referer":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"rt":$request_time,'
        '"upstream_rt":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/staging-access.log json_combined;
    error_log  /var/log/nginx/staging-error.log warn;

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    # nginx stub status for prometheus exporter
    server {
        listen 127.0.0.1:80;
        server_name _;
        location /stub_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.16.0.0/12; # docker
            deny all;
        }
    }
}
