###############################################################################
# Prometheus scrape config - staging
###############################################################################

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: staging
    project: catering
    region: eu-central

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node_exporter
    static_configs:
      - targets:
          - "staging-app-1:9100"
        labels:
          host: staging-app-1

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: app_api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["api:4000"]
        labels:
          service: api
          team: backend

  - job_name: app_worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9464"]
        labels:
          service: worker
          team: backend

  - job_name: blackbox
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://staging.catering.co.il
          - https://api.staging.catering.co.il/health
          - https://portal.staging.catering.co.il
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
