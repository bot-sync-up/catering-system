{{- if .Values.next.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-next
  labels: {{- include "app.labels" (dict "Chart" .Chart "Release" .Release "Values" .Values) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - { port: 80, targetPort: http, name: http }
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: next
{{- end }}
---
{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway
  labels: {{- include "app.labels" (dict "Chart" .Chart "Release" .Release "Values" .Values) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - { port: 80, targetPort: http, name: http }
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: gateway
{{- end }}
