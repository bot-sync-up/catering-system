# HTTP -> HTTPS redirect (except healthz + acme-challenge)
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# Main HTTPS server
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name ${NGINX_SERVER_NAME};

  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:SSL:50m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 1.1.1.1 8.8.8.8 valid=300s;
  resolver_timeout 5s;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self'" always;

  limit_conn conn 50;

  # Static caching for Next.js _next assets
  location /_next/static/ {
    proxy_cache static_cache;
    proxy_cache_valid 200 365d;
    proxy_cache_use_stale error timeout updating;
    add_header Cache-Control "public, max-age=31536000, immutable";
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # next/image optimized output
  location /_next/image {
    proxy_cache static_cache;
    proxy_cache_valid 200 30d;
    proxy_cache_key "$scheme$host$request_uri";
    add_header Cache-Control "public, max-age=2592000";
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # Auth endpoints — tighter limits
  location ~* ^/api/(auth|login|register|otp) {
    limit_req zone=login_rl burst=10 nodelay;
    proxy_pass http://gateway_api;
    include /etc/nginx/conf.d/_proxy.inc;
  }

  # API to gateway
  location /api/ {
    limit_req zone=api_rl burst=40 nodelay;
    proxy_pass http://gateway_api;
    include /etc/nginx/conf.d/_proxy.inc;
  }

  # Prometheus (basic auth in real deploys)
  location /prometheus/ {
    auth_basic "ops";
    auth_basic_user_file /etc/nginx/certs/.htpasswd;
    proxy_pass http://prometheus_ui/;
    include /etc/nginx/conf.d/_proxy.inc;
  }

  # Grafana
  location /grafana/ {
    proxy_pass http://grafana_ui/;
    proxy_set_header Host $host;
    include /etc/nginx/conf.d/_proxy.inc;
  }

  # Everything else -> Next.js
  location / {
    proxy_pass http://next_app;
    include /etc/nginx/conf.d/_proxy.inc;
  }

  # Healthcheck used by nginx HEALTHCHECK
  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }
}
