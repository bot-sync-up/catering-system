user  nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 8192;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Performance
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout  65;
  keepalive_requests 1000;
  reset_timedout_connection on;
  server_tokens   off;
  client_max_body_size 25m;
  client_body_buffer_size 128k;
  client_header_timeout 12;
  client_body_timeout 12;
  send_timeout 10;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml
    application/xml+rss application/wasm
    font/woff font/woff2 image/svg+xml;

  # Logs (JSON for Loki)
  log_format json_main escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes":$body_bytes_sent,'
      '"referer":"$http_referer",'
      '"ua":"$http_user_agent",'
      '"req_time":$request_time,'
      '"upstream_time":"$upstream_response_time",'
      '"upstream":"$upstream_addr",'
      '"host":"$host"'
    '}';
  access_log /var/log/nginx/access.log json_main;

  # Rate limit zones
  limit_req_zone  $binary_remote_addr zone=api_rl:10m   rate=20r/s;
  limit_req_zone  $binary_remote_addr zone=login_rl:10m rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=conn:10m;

  # Cache zone for next/image and public assets
  proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:50m max_size=2g
                   inactive=60m use_temp_path=off;

  # Upstreams
  upstream next_app {
    least_conn;
    server next:3000 max_fails=3 fail_timeout=30s;
    keepalive 64;
  }
  upstream gateway_api {
    least_conn;
    server gateway:4000 max_fails=3 fail_timeout=30s;
    keepalive 64;
  }
  upstream grafana_ui {
    server grafana:3000;
  }
  upstream prometheus_ui {
    server prometheus:9090;
  }

  include /etc/nginx/conf.d/*.conf;
}
