version: "3.9"

# Production stack: Postgres 16 + Redis 7 + Nginx + Next.js gateway + worker + Prometheus + Grafana + Loki + Promtail
# Use:  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# All services run behind an internal Docker network. Only nginx exposes ports to the host.
# Healthchecks block startup of dependents until each service is actually ready (not just running).

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"
    tag: "{{.Name}}"

x-restart: &default-restart
  restart: unless-stopped

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: false

volumes:
  postgres_data:
  postgres_wal:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  nginx_cache:

services:
  postgres:
    image: postgres:16-alpine
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
        -c wal_level=replica
        -c archive_mode=on
        -c archive_command='test ! -f /var/lib/postgresql/wal/%f && cp %p /var/lib/postgresql/wal/%f'
        -c max_wal_senders=3
        -c wal_keep_size=512MB
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c max_connections=200
        -c log_min_duration_statement=500
        -c log_checkpoints=on
        -c log_connections=off
        -c log_lock_waits=on
        -c log_temp_files=0
        -c log_autovacuum_min_duration=0
        -c track_io_timing=on
        -c track_functions=pl
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_wal:/var/lib/postgresql/wal
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    <<: *default-restart
    logging: *default-logging
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
        --maxmemory 1gb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --tcp-keepalive 60
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  gateway:
    build:
      context: ../../
      dockerfile: production-pack/docker/Dockerfile.gateway
    <<: *default-restart
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      AES_KEY: ${AES_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  next:
    build:
      context: ../../
      dockerfile: production-pack/docker/Dockerfile.next
    <<: *default-restart
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      GATEWAY_URL: http://gateway:4000
      JWT_SECRET: ${JWT_SECRET}
      AES_KEY: ${AES_KEY}
    depends_on:
      gateway: { condition: service_healthy }
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  worker:
    build:
      context: ../../
      dockerfile: production-pack/docker/Dockerfile.worker
    <<: *default-restart
    logging: *default-logging
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      AES_KEY: ${AES_KEY}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(require('fs').existsSync('/tmp/worker-alive')?0:1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    <<: *default-restart
    logging: *default-logging
    depends_on:
      next: { condition: service_healthy }
      gateway: { condition: service_healthy }
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - edge
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.0
    <<: *default-restart
    logging: *default-logging
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.external-url=/prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.3.0
    <<: *default-restart
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost/grafana}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - internal
    depends_on:
      prometheus: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:3.2.0
    <<: *default-restart
    logging: *default-logging
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.2.0
    <<: *default-restart
    logging: *default-logging
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    depends_on:
      loki: { condition: service_healthy }

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    <<: *default-restart
    logging: *default-logging
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    networks:
      - internal
    depends_on:
      postgres: { condition: service_healthy }

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    <<: *default-restart
    logging: *default-logging
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - internal
    depends_on:
      redis: { condition: service_healthy }

  node-exporter:
    image: prom/node-exporter:v1.8.2
    <<: *default-restart
    logging: *default-logging
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - internal
