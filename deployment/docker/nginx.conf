user  nginx;
worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Logging ----------
    log_format main escape=json '{'
        '"time":"$time_iso8601","remote_addr":"$remote_addr","host":"$host",'
        '"request":"$request","status":$status,"bytes":$body_bytes_sent,'
        '"rt":$request_time,"ua":"$http_user_agent","ref":"$http_referer",'
        '"upstream":"$upstream_addr","upstream_rt":"$upstream_response_time"'
        '}';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---------- Perf ----------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 4096;
    server_tokens off;
    client_max_body_size 50m;
    client_body_buffer_size 128k;
    proxy_buffer_size 16k;
    proxy_buffers   8 16k;
    proxy_busy_buffers_size 32k;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
      text/plain text/css text/javascript text/xml application/javascript
      application/json application/xml application/rss+xml font/ttf font/otf
      image/svg+xml application/vnd.ms-fontobject application/x-font-ttf;

    # ---------- Rate limiting ----------
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ---------- SSL defaults ----------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # ---------- Security headers (applied via map) ----------
    map $sent_http_content_type $csp_policy {
        default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.sentry-cdn.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.sentry.io wss:; frame-ancestors 'none';";
    }

    # ---------- Upstreams (20 apps + workers) ----------
    upstream app_web         { least_conn; server app-web:3000 max_fails=3 fail_timeout=10s; keepalive 32; }
    upstream app_admin       { least_conn; server app-admin:3000;       keepalive 32; }
    upstream app_driver      { least_conn; server app-driver:3000;      keepalive 32; }
    upstream app_kitchen     { least_conn; server app-kitchen:3000;     keepalive 32; }
    upstream app_pos         { least_conn; server app-pos:3000;         keepalive 32; }
    upstream app_customer    { least_conn; server app-customer:3000;    keepalive 32; }
    upstream app_merchant    { least_conn; server app-merchant:3000;    keepalive 32; }
    upstream app_analytics   { least_conn; server app-analytics:3000;   keepalive 32; }
    upstream app_loyalty     { least_conn; server app-loyalty:3000;     keepalive 32; }
    upstream app_inventory   { least_conn; server app-inventory:3000;   keepalive 32; }
    upstream app_crm         { least_conn; server app-crm:3000;         keepalive 32; }
    upstream app_marketing   { least_conn; server app-marketing:3000;   keepalive 32; }
    upstream app_reports     { least_conn; server app-reports:3000;     keepalive 32; }
    upstream app_support     { least_conn; server app-support:3000;     keepalive 32; }
    upstream app_finance     { least_conn; server app-finance:3000;     keepalive 32; }
    upstream app_hr          { least_conn; server app-hr:3000;          keepalive 32; }
    upstream app_procurement { least_conn; server app-procurement:3000; keepalive 32; }
    upstream app_quality     { least_conn; server app-quality:3000;     keepalive 32; }
    upstream app_compliance  { least_conn; server app-compliance:3000;  keepalive 32; }
    upstream app_gateway     { least_conn; server app-api-gateway:3000; keepalive 64; }
    upstream bull_board      { server bullmq-board:3000; }
    upstream grafana_up      { server grafana:3000; }
    upstream prometheus_up   { server prometheus:9090; }

    # ---------- 80 -> 443 redirect + ACME ----------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

        location / { return 301 https://$host$request_uri; }
    }

    # Load per-app server blocks
    include /etc/nginx/conf.d/*.conf;
}
