version: "3.9"

# Production overrides — apply with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=/usr/local/bin/wal-archive.sh %p %f"

  redis:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  gateway:
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
      restart_policy:
        condition: on-failure
        max_attempts: 3
    environment:
      LOG_LEVEL: warn
      RATE_LIMIT_MAX: 100

  next:
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  worker:
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

  nginx:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  prometheus:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  grafana:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
