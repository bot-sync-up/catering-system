# Per-app subdomain reverse proxies. SSL is shared via the wildcard cert mounted in nginx.
# Replace ${DOMAIN} via envsubst on first start, or hardcode in deployment.

# ---- Helper: SSL block to reuse ----
# (We use full server blocks rather than 'include' so each app can override caching policy.)

# === www / public site ===
server {
    listen 443 ssl http2;
    server_name www.example.com example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    include /etc/nginx/conf.d/../common-security.inc;
    limit_conn conn 50;

    location / {
        include /etc/nginx/conf.d/../common-proxy.inc;
        limit_req zone=api burst=60 nodelay;
        proxy_pass http://app_web;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|woff2?|svg|ttf|otf)$ {
        proxy_pass http://app_web;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /api/auth/ {
        include /etc/nginx/conf.d/../common-proxy.inc;
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://app_web;
    }
}

