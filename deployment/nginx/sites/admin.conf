# admin subdomain — internal admin panel; IP-restricted + stricter CSP
geo $admin_allowed {
    default 0;
    10.0.0.0/8     1;
    172.16.0.0/12  1;
    192.168.0.0/16 1;
    # office static IP - replace as needed
    # 203.0.113.10/32 1;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.example.co.il;
    return 301 https://admin.example.co.il$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.example.co.il;

    ssl_certificate /etc/nginx/certs/admin.example.co.il.crt;
    ssl_certificate_key /etc/nginx/certs/admin.example.co.il.key;

    # Stricter CSP for admin
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;
    add_header X-Frame-Options "DENY" always;

    # Optional IP allowlist (disable in dev by setting $admin_allowed=1 above)
    if ($admin_allowed = 0) {
        # comment the next line out to disable IP filter
        # return 403;
    }

    limit_conn conn 20;
    limit_req zone=auth burst=20 nodelay;

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Admin-Request "true";
        proxy_pass http://gateway:4000;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://next:3000;
    }
}
