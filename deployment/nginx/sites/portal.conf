# portal subdomain — customer-facing portal + API
server {
    listen 80;
    listen [::]:80;
    server_name portal.example.co.il;
    return 301 https://portal.example.co.il$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portal.example.co.il;

    ssl_certificate /etc/nginx/certs/portal.example.co.il.crt;
    ssl_certificate_key /etc/nginx/certs/portal.example.co.il.key;

    limit_conn conn 30;

    # API → gateway
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://gateway:4000;
    }

    location /api/ {
        limit_req zone=api burst=100 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_pass http://gateway:4000;
    }

    # WebSocket
    location /ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_pass http://gateway:4000;
    }

    # Portal SPA
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://next:3000;
    }
}
