# www subdomain — public marketing site + Next.js storefront
server {
    listen 80;
    listen [::]:80;
    server_name www.example.co.il example.co.il;
    return 301 https://www.example.co.il$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.co.il;
    ssl_certificate /etc/nginx/certs/example.co.il.crt;
    ssl_certificate_key /etc/nginx/certs/example.co.il.key;
    return 301 https://www.example.co.il$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.example.co.il;

    ssl_certificate /etc/nginx/certs/example.co.il.crt;
    ssl_certificate_key /etc/nginx/certs/example.co.il.key;

    limit_conn conn 50;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_cache static_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
        expires 1y;
        access_log off;
        proxy_pass http://next:3000;
    }

    location /static/ {
        proxy_cache static_cache;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        proxy_pass http://next:3000;
    }

    # Health
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Everything else → Next.js
    location / {
        limit_req zone=api burst=60 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_pass http://next:3000;
    }
}
