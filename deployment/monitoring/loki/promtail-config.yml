server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{service=~"gateway|next|worker"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
                  trace_id: trace_id
            - labels:
                level:
                trace_id:

  - job_name: nginx
    static_configs:
      - targets: ["localhost"]
        labels:
          job: nginx
          __path__: /var/log/nginx/*.log
    pipeline_stages:
      - json:
          expressions:
            status: status
            request: request
            rt: rt
      - labels:
          status:
