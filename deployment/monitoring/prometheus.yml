global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: production
    environment: prod

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # 20 Next.js apps expose /api/metrics (prom-client)
  - job_name: nextjs-apps
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - "app-web:3000"
          - "app-admin:3000"
          - "app-driver:3000"
          - "app-kitchen:3000"
          - "app-pos:3000"
          - "app-customer:3000"
          - "app-merchant:3000"
          - "app-analytics:3000"
          - "app-loyalty:3000"
          - "app-inventory:3000"
          - "app-crm:3000"
          - "app-marketing:3000"
          - "app-reports:3000"
          - "app-support:3000"
          - "app-finance:3000"
          - "app-hr:3000"
          - "app-procurement:3000"
          - "app-quality:3000"
          - "app-compliance:3000"
          - "app-api-gateway:3000"
    relabel_configs:
      - source_labels: [__address__]
        regex: "app-(.+):3000"
        target_label: app
        replacement: "$1"

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9100"]

  - job_name: bullmq
    metrics_path: /metrics
    static_configs:
      - targets: ["bullmq-board:3000"]

  - job_name: nginx
    metrics_path: /metrics
    static_configs:
      - targets: ["nginx:9113"]

  - job_name: blackbox
    metrics_path: /probe
    params: { module: [http_2xx] }
    static_configs:
      - targets:
          - https://www.example.com
          - https://admin.example.com
          - https://api.example.com/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
