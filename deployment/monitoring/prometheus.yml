global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "prod"
    region: "il-central"

rule_files:
  - "/etc/prometheus/alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:4000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: gateway

  - job_name: next
    metrics_path: /api/metrics
    static_configs:
      - targets: ["next:3000"]

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9100"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
