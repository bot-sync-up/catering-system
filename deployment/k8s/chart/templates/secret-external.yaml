# ExternalSecret bound to Vault / AWS Secrets Manager via External-Secrets Operator.
# Replace `secretStoreRef.name` with the configured ClusterSecretStore.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secrets.externalSecretsRef }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secrets.externalSecretsRef }}
    creationPolicy: Owner
  data:
    - { secretKey: DATABASE_URL,            remoteRef: { key: platform/db,        property: url } }
    - { secretKey: REDIS_URL,               remoteRef: { key: platform/redis,     property: url } }
    - { secretKey: JWT_SECRET,              remoteRef: { key: platform/auth,      property: jwt } }
    - { secretKey: JWT_REFRESH_SECRET,      remoteRef: { key: platform/auth,      property: refresh } }
    - { secretKey: AES_KEY,                 remoteRef: { key: platform/auth,      property: aes } }
    - { secretKey: NEXTAUTH_SECRET,         remoteRef: { key: platform/auth,      property: nextauth } }
    - { secretKey: SENTRY_DSN,              remoteRef: { key: platform/obs,       property: sentry_dsn } }
    - { secretKey: ICOUNT_API_TOKEN,        remoteRef: { key: platform/payments,  property: icount_token } }
    - { secretKey: CARDCOM_TERMINAL,        remoteRef: { key: platform/payments,  property: cardcom_terminal } }
    - { secretKey: CARDCOM_USERNAME,        remoteRef: { key: platform/payments,  property: cardcom_user } }
    - { secretKey: CARDCOM_API_PASSWORD,    remoteRef: { key: platform/payments,  property: cardcom_pass } }
    - { secretKey: WHATSAPP_TOKEN,          remoteRef: { key: platform/whatsapp,  property: token } }
    - { secretKey: S3_ACCESS_KEY,           remoteRef: { key: platform/storage,   property: access } }
    - { secretKey: S3_SECRET_KEY,           remoteRef: { key: platform/storage,   property: secret } }
