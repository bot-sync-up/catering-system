{{- if .Values.worker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: worker }
spec:
  replicas: {{ .Values.worker.replicas }}
  selector: { matchLabels: { app.kubernetes.io/name: worker } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: worker }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "9100" }
    spec:
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.worker.image }}:{{ .Values.image.tag }}"
          envFrom:
            - configMapRef: { name: platform-config }
            - secretRef:    { name: {{ .Values.secrets.externalSecretsRef }} }
          ports: [{ name: metrics, containerPort: 9100 }]
          readinessProbe: { httpGet: { path: /healthz, port: 9100 }, initialDelaySeconds: 10 }
          livenessProbe:  { httpGet: { path: /healthz, port: 9100 }, initialDelaySeconds: 30, periodSeconds: 30 }
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: worker }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: worker }
  minReplicas: {{ .Values.worker.replicas }}
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
    - type: Pods
      pods:
        metric: { name: bullmq_queue_waiting }
        target: { type: AverageValue, averageValue: "100" }
{{- end }}
