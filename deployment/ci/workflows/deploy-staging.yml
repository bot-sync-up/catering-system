name: Deploy / Staging
on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    strategy:
      matrix:
        app:
          - web
          - admin
          - driver
          - kitchen
          - pos
          - customer
          - merchant
          - analytics
          - loyalty
          - inventory
          - crm
          - marketing
          - reports
          - support
          - finance
          - hr
          - procurement
          - quality
          - compliance
          - api-gateway
          - worker
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: echo "value=staging-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/Dockerfile.nextjs
          build-args: APP_NAME=${{ matrix.app }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to:   type=gha,scope=${{ matrix.app }},mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.16.0 }
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config
      - name: Helm upgrade
        run: |
          helm upgrade --install platform deployment/k8s/chart \
            --namespace staging --create-namespace \
            -f deployment/k8s/values/staging.yaml \
            --set image.tag=${{ needs.build-push.outputs.tag }} \
            --atomic --timeout 10m
      - name: Smoke tests
        run: pnpm test:smoke --baseUrl=https://staging.example.com
