name: Security Scan
on:
  schedule:
    - cron: "0 3 * * *"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "9.12.0" }
      - uses: actions/setup-node@v4
        with: { node-version: "20.18.0", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (prod only, high+)
        run: pnpm audit --prod --audit-level=high

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-fs.sarif
          exit-code: "1"
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy-fs.sarif }

  trivy-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web, admin, api-gateway, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: |
          docker build \
            --build-arg APP_NAME=${{ matrix.app }} \
            -f deployment/docker/Dockerfile.nextjs \
            -t localscan:${{ matrix.app }} .
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: localscan:${{ matrix.app }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: deployment/ci/gitleaks.toml

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: javascript-typescript }
      - uses: github/codeql-action/analyze@v3

  semgrep:
    runs-on: ubuntu-latest
    container: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --config p/owasp-top-ten --config p/javascript --config p/typescript --config p/nextjs
        env: { SEMGREP_APP_TOKEN: "${{ secrets.SEMGREP_APP_TOKEN }}" }
