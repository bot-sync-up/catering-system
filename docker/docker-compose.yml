version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aneh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aneh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aneh_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-aneh_hashoel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aneh}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aneh-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: aneh-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-aneh}:${POSTGRES_PASSWORD:-aneh_dev_password}@postgres:5432/${POSTGRES_DB:-aneh_hashoel}
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: aneh-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  redis_data:
