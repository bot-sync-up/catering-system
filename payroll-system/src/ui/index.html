<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת חישוב שכר</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>מערכת חישוב שכר</h1>
      <span class="subtitle">Payroll System - 2026</span>
    </div>
    <nav class="nav">
      <button class="nav-btn active" data-view="employees">עובדים</button>
      <button class="nav-btn" data-view="payroll">חישוב שכר</button>
      <button class="nav-btn" data-view="reports">דוחות</button>
    </nav>
  </header>

  <main class="container">

    <!-- ============ עובדים ============ -->
    <section id="view-employees" class="view active">
      <div class="view-header">
        <h2>עובדים</h2>
        <button class="btn primary" id="btn-new-employee">+ עובד חדש</button>
      </div>
      <div class="card">
        <table class="data-table" id="employees-table">
          <thead>
            <tr>
              <th>מס' עובד</th>
              <th>ת.ז.</th>
              <th>שם מלא</th>
              <th>תפקיד</th>
              <th>מחלקה</th>
              <th>תאריך התחלה</th>
              <th>שכר בסיס</th>
              <th>תעריף שעתי</th>
              <th>פעולות</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- ============ חישוב שכר ============ -->
    <section id="view-payroll" class="view">
      <div class="view-header">
        <h2>חישוב שכר חודשי</h2>
      </div>
      <div class="card">
        <form id="form-payroll" class="grid-2">
          <div class="field">
            <label>עובד</label>
            <select name="employeeId" id="payroll-employee" required></select>
          </div>
          <div class="field">
            <label>חודש/שנה</label>
            <div class="row gap">
              <select name="month" id="payroll-month"></select>
              <input type="number" name="year" id="payroll-year" value="2026" min="2020" max="2030" />
            </div>
          </div>

          <div class="field full">
            <label>ימי עבודה (לחישוב לפי שעות)</label>
            <div id="workdays-container"></div>
            <button type="button" class="btn small" id="add-workday">+ הוסף יום</button>
          </div>

          <div class="field">
            <label>ימי מחלה החודש</label>
            <input type="number" name="sickDaysThisMonth" min="0" value="0" />
          </div>
          <div class="field">
            <label>ימי חופשה החודש</label>
            <input type="number" name="vacationDaysThisMonth" min="0" value="0" />
          </div>

          <div class="field full">
            <label>תוספות / בונוסים</label>
            <div id="extras-container"></div>
            <button type="button" class="btn small" id="add-extra">+ הוסף תוספת</button>
          </div>

          <div class="field">
            <label>מקדמה</label>
            <input type="number" name="advanceAmount" min="0" value="0" step="0.01" />
          </div>

          <div class="field">
            <label>מילואים - ימים</label>
            <input type="number" name="miluimDays" min="0" value="0" />
          </div>

          <div class="field full actions">
            <button type="submit" class="btn primary big">חשב שכר</button>
          </div>
        </form>
      </div>

      <div id="payroll-result" class="card hidden">
        <h3>תוצאת חישוב</h3>
        <div id="payroll-result-content"></div>
        <div class="actions">
          <button class="btn primary" id="btn-generate-payslip">הפק תלוש PDF</button>
        </div>
      </div>
    </section>

    <!-- ============ דוחות ============ -->
    <section id="view-reports" class="view">
      <div class="view-header">
        <h2>דוחות</h2>
      </div>

      <div class="card">
        <h3>טופס 106 (שנתי)</h3>
        <form id="form-106" class="grid-2">
          <div class="field">
            <label>עובד</label>
            <select name="employeeId" id="r106-employee" required></select>
          </div>
          <div class="field">
            <label>שנה</label>
            <input type="number" name="year" value="2026" min="2020" max="2030" />
          </div>
          <div class="field full">
            <button type="submit" class="btn primary">הפק טופס 106</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h3>דוח 102 (חודשי - מס הכנסה)</h3>
        <form id="form-102" class="grid-2">
          <div class="field">
            <label>חודש</label>
            <select name="month" id="r102-month"></select>
          </div>
          <div class="field">
            <label>שנה</label>
            <input type="number" name="year" value="2026" />
          </div>
          <div class="field full">
            <label>שם מעסיק</label>
            <input type="text" name="employerName" value='חברה בע"מ' />
          </div>
          <div class="field full">
            <button type="submit" class="btn primary">הפק דוח 102</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h3>דוח 126 (חודשי - ביטוח לאומי)</h3>
        <form id="form-126" class="grid-2">
          <div class="field">
            <label>חודש</label>
            <select name="month" id="r126-month"></select>
          </div>
          <div class="field">
            <label>שנה</label>
            <input type="number" name="year" value="2026" />
          </div>
          <div class="field">
            <label>שם מעסיק</label>
            <input type="text" name="employerName" value='חברה בע"מ' />
          </div>
          <div class="field">
            <label>תיק ניכויים</label>
            <input type="text" name="employerNumber" value="123456789" />
          </div>
          <div class="field full">
            <button type="submit" class="btn primary">הפק דוח 126</button>
          </div>
        </form>
      </div>

      <div class="card" id="report-output">
        <h3>קישורי דוחות שהופקו</h3>
        <ul id="reports-list"></ul>
      </div>
    </section>
  </main>

  <!-- Modal עובד -->
  <div class="modal hidden" id="employee-modal">
    <div class="modal-content">
      <h3 id="modal-title">עובד חדש</h3>
      <form id="form-employee" class="grid-2">
        <div class="field"><label>שם פרטי</label><input name="firstName" required /></div>
        <div class="field"><label>שם משפחה</label><input name="lastName" required /></div>
        <div class="field"><label>ת.ז.</label><input name="tz" required /></div>
        <div class="field"><label>תאריך תחילת עבודה</label><input name="startDate" type="date" required /></div>
        <div class="field"><label>תפקיד</label><input name="position" /></div>
        <div class="field"><label>מחלקה</label><input name="department" /></div>
        <div class="field"><label>שכר בסיס חודשי</label><input name="baseSalary" type="number" min="0" step="0.01" /></div>
        <div class="field"><label>תעריף שעתי</label><input name="hourlyRate" type="number" min="0" step="0.01" /></div>
        <div class="field"><label>שעות תקן בחודש</label><input name="monthlyHours" type="number" min="0" value="182" /></div>
        <div class="field"><label>נקודות זיכוי</label><input name="taxCredits" type="number" step="0.25" value="2.25" /></div>
        <div class="field"><label>מספר ילדים</label><input name="numChildren" type="number" min="0" value="0" /></div>
        <div class="field">
          <label>פנסיה?</label>
          <input name="hasPension" type="checkbox" checked />
        </div>
        <div class="field">
          <label>קרן השתלמות?</label>
          <input name="hasKerenHishtalmut" type="checkbox" />
        </div>
        <div class="field full actions">
          <button type="button" class="btn" id="btn-cancel-employee">ביטול</button>
          <button type="submit" class="btn primary">שמור</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
